name: Build Kernel liyafe1977
run-name: Build Kernel with SukiSU Ultra SUSFS (pinned commit)
on:
  workflow_dispatch:
    inputs:
      roota:
        description: 'ksu or leave empty for no root'
        required: false
        type: string
      phonea:
        description: 'Device codename (e.g. alioth)'
        required: false
        type: string
jobs:
  build_job:
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CI: "false"
    steps:

      - name: 1. Install toolchain
        run: |
          mkdir $GITHUB_WORKSPACE/proton-clang
          cd proton-clang
          wget https://github.com/kdrag0n/proton-clang/archive/refs/tags/20210522.zip
          unzip 20210522.zip
          cd ..
          sudo apt install build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3

      - name: 2. Clone kernel source
        run: |
          mkdir $GITHUB_WORKSPACE/kernel_workspace
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone https://github.com/liyafe1997/kernel_xiaomi_sm8250_mod -b android15-lineage22-mod --depth=1 android_kernel

      - name: 3. Patch and build
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android_kernel
          # Disable KPM (not compatible with 4.19)
          sed -i 's/-e KPM/-d KPM/g' build.sh
          # Remove KPM patch steps
          sed -i '/wget.*patch_linux/d' build.sh
          sed -i '/chmod.*patch_linux/d' build.sh
          sed -i '/\.\/patch_linux/d' build.sh
          sed -i '/rm Image/d' build.sh
          sed -i '/mv oImage Image/d' build.sh
          bash build.sh ${{ inputs.phonea }} ${{ inputs.roota }}

      - name: 4. Upload flashable zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.phonea }}-${{ inputs.roota }}-kernel-AnyKernel3
          path: kernel_workspace/android_kernel/anykernel/*
          retention-days: 3
